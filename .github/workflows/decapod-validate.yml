name: Decapod Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Nix
        uses: cachix/install-nix-action@v30
      - name: Nix flake checks
        run: nix flake check --no-build --no-update-lock-file
      - name: Repository quality gates
        run: nix develop --accept-flake-config -c ./scripts/validate-repo.sh
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Decapod
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/decapod
          key: ${{ runner.os }}-decapod
      - name: Install Decapod
        run: |
          if ! command -v decapod &> /dev/null; then
            cargo install decapod
          fi
      - name: Decapod Validate
        env:
          DECAPOD_VALIDATE_SKIP_GIT_GATES: 1
        run: |
          decapod init --proof
          TASK_ID=$(decapod todo add "CI validation" -o json 2>/dev/null | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          decapod todo claim --id $TASK_ID
          WORKSPACE_OUTPUT=$(decapod workspace ensure 2>&1)
          WORKSPACE_DIR=$(echo "$WORKSPACE_OUTPUT" | grep -o '"worktree_path":"[^"]*"' | cut -d'"' -f4)
          cd "$WORKSPACE_DIR"
          decapod validate
