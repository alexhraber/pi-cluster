apiVersion: apps/v1
kind: Deployment
metadata:
  name: offline-http-probe
  labels:
    app.kubernetes.io/name: offline-http-probe
    app.kubernetes.io/part-of: pi-cluster-validation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: offline-http-probe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: offline-http-probe
        app.kubernetes.io/part-of: pi-cluster-validation
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      terminationGracePeriodSeconds: 10
      containers:
        - name: http
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: offline-http-probe
  labels:
    app.kubernetes.io/name: offline-http-probe
    app.kubernetes.io/part-of: pi-cluster-validation
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: offline-http-probe
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
