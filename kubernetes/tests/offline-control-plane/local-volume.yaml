apiVersion: v1
kind: PersistentVolume
metadata:
  name: offline-local-pv-pi-01
  labels:
    app.kubernetes.io/part-of: pi-cluster-validation
spec:
  capacity:
    storage: 1Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: edge-local-manual
  local:
    path: /var/lib/pi-cluster/validation/persistence
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [pi-01]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: offline-local-pvc
  namespace: edge-validation
  labels:
    app.kubernetes.io/part-of: pi-cluster-validation
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: edge-local-manual
  resources:
    requests:
      storage: 1Gi
  volumeName: offline-local-pv-pi-01
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: offline-persistence-probe
  namespace: edge-validation
  labels:
    app.kubernetes.io/name: offline-persistence-probe
    app.kubernetes.io/part-of: pi-cluster-validation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: offline-persistence-probe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: offline-persistence-probe
        app.kubernetes.io/part-of: pi-cluster-validation
    spec:
      nodeSelector:
        kubernetes.io/hostname: pi-01
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: writer
          image: busybox:1.36.1
          command: ["/bin/sh", "-c"]
          args:
            - while true; do date -Iseconds >> /data/heartbeat.log; sleep 10; done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: offline-local-pvc
